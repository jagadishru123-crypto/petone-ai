<!DOCTYPE html>
<html>

<head>

    <title>Add Pet - PetOne AI</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="addpet-container">

    <div class="pet-header">

        <div class="pet-avatar">
            🐾
        </div>

        <h1>Add New Pet</h1>

        <p>
            Create your pet profile and manage important information
        </p>

    </div>

    <div class="pet-card">

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="pet-grid">

                <div class="field">

                    <label>🐾 Pet Name</label>

                    <input
                        type="text"
                        name="pet_name"
                        required
                    >

                </div>

                <div class="field">

                    <label>🐶 Pet Type</label>

                    <input
                        type="text"
                        name="pet_type"
                        required
                    >

                </div>

                <div class="field">

                    <label>🧬 Breed</label>

                    <input
                        type="text"
                        name="breed"
                    >

                </div>

                <div class="field">

                    <label>🎂 Age</label>

                    <input
                        type="text"
                        id="age"
                        name="age"
                        readonly
                    >

                </div>

                <div class="field">

                    <label>📅 Date of Birth</label>

                    <input
                        type="date"
                        id="dob"
                        name="dob"
                        required
                    >

                </div>

                <div class="field">

                    <label>⚥ Gender</label>

                    <select name="gender">

                        <option>Male</option>

                        <option>Female</option>

                    </select>

                </div>

                <div class="field">

                    <label>⚖ Weight</label>

                    <input
                        type="text"
                        name="weight"
                        placeholder="10 kg"
                    >

                </div>

                <div class="field">

                    <label>🎨 Color</label>

                    <input
                        type="text"
                        name="color"
                    >

                </div>

                <div class="field">

                    <label>💉 Vaccinated</label>

                    <select name="vaccinated">

                        <option>Yes</option>

                        <option>No</option>

                    </select>

                </div>

                <div class="field">

                    <label>✂ Neutered / Spayed</label>

                    <select name="neutered">

                        <option>Yes</option>

                        <option>No</option>

                    </select>

                </div>

                <div class="field">

                    <label>💊 Vaccination Name</label>

                    <input
                        type="text"
                        name="vaccination"
                        placeholder="Rabies"
                    >

                </div>

                <div class="field">

                    <label>📅 Next Vaccine Date</label>

                    <input
                        type="date"
                        name="next_vaccine_date"
                    >

                </div>

                <div class="field full-width">

                    <label>📸 Pet Photo</label>

                    <input
                        type="file"
                        name="photo"
                        accept="image/*"
                    >

                </div>

                <div class="field full-width">

                    <label>📝 Notes</label>

                    <textarea
                        name="notes"
                        rows="5"
                    ></textarea>

                </div>

            </div>

            <button
                type="submit"
                class="save-btn"
            >
                💾 Save Pet
            </button>

        </form>

    </div>

</div>

<script>

const dob =
document.getElementById("dob");

dob.addEventListener(
"change",
function(){

    let birthDate =
        new Date(this.value);

    let today =
        new Date();

    let age =
        today.getFullYear() -
        birthDate.getFullYear();

    let month =
        today.getMonth() -
        birthDate.getMonth();

    if(
        month < 0 ||
        (
            month === 0 &&
            today.getDate() <
            birthDate.getDate()
        )
    ){
        age--;
    }

    document
    .getElementById("age")
    .value =
    age + " Years";

});

</script>

</body>
</html>
