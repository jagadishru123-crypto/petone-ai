<!DOCTYPE html>
<html>
<head>
    <title>PetOne AI - Sign Up</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div style="width:400px;margin:100px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2>📝 Create PetOne AI Account</h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required
            style="width:100%;padding:12px;margin-bottom:15px;"
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
            style="width:100%;padding:12px;margin-bottom:15px;"
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
            style="width:100%;padding:12px;margin-bottom:15px;"
        >

        <button
            type="submit"
            style="width:100%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:10px;"
        >
            Sign Up
        </button>

    </form>

</div>

</body>
</html>
